<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Marketing ROI & ROAS Calculator 📊</title>
    <!-- Chart.js library for beautiful graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Dark Theme & Layout */
        :root {
            --primary-neon: #3b82f6; /* Neon Blue */
            --primary-hover: #60a5fa;
            --success-neon: #10b981; /* Neon Green */
            --danger-neon: #ef4444; /* Neon Red */
            --bg-dark: #0f172a; /* Deep Dark Blue-Grey */
            --card-glass: rgba(30, 41, 59, 0.7); /* Translucent Card */
            --text-main: #f1f5f9; /* Near White */
            --text-muted: #94a3b8; /* Greyed Text */
            --input-bg: rgba(51, 65, 85, 0.5); /* Darker Input */
            --border-glass: rgba(148, 163, 184, 0.2); /* Soft Border */
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Glassmorphism Card Effect */
        .container {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 550px;
            transition: transform 0.3s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
        }

        h2 {
            text-align: center;
            color: var(--text-main);
            margin-bottom: 25px;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* Styling Inputs & Select with Dark Background */
        input, select {
            width: 100%;
            padding: 14px 18px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-neon);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            background-color: rgba(51, 65, 85, 0.8);
        }

        select option {
            background-color: var(--bg-dark);
            color: var(--text-main);
        }
        
        input::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }

        /* Neon Blue Button */
        button {
            width: 100%;
            background: var(--primary-neon);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        button:hover {
            background: var(--primary-hover);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }

        /* Darker Results Box */
        .results {
            margin-top: 35px;
            padding: 25px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            border: 1px solid var(--border-glass);
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            padding-bottom: 10px;
        }
        
        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .result-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Highlights with Neon Colors */
        .highlight {
            font-weight: 800;
            font-size: 18px;
            color: var(--success-neon);
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }
        
        .highlight.negative {
            color: var(--danger-neon);
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .chart-container {
            margin-top: 30px;
            max-height: 280px;
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Advanced ROI & ROAS Calculator 📊</h2>
    
    <!-- Currency Selector Feature -->
    <div class="input-group">
        <label for="currency">Select Currency / اختر العملة:</label>
        <select id="currency" onchange="updateCurrencyLabels()">
            <option value="DA">DA (دج - Algerian Dinar)</option>
            <option value="$">USD ($ - US Dollar)</option>
            <option value="€">EUR (€ - Euro)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Total Ad Spend (<span class="curr-label">DA</span>):</label>
        <input type="number" id="adSpend" placeholder="e.g. 100" required>
    </div>
    
    <div class="input-group">
        <label>Total Revenue Generated (<span class="curr-label">DA</span>):</label>
        <input type="number" id="revenue" placeholder="e.g. 350" required>
    </div>
    
    <div class="input-group">
        <label>Product Cost & Shipping (<span class="curr-label">DA</span>):</label>
        <input type="number" id="costs" placeholder="e.g. 120" required>
    </div>
    
    <button onclick="calculateROI()">Calculate Results 🚀</button>
    
    <div class="results" id="resultsBox">
        <div class="result-item">
            <span class="result-label">Return on Ad Spend (ROAS):</span>
            <span id="roasVal" class="highlight">0</span>
        </div>
        <div class="result-item">
            <span class="result-label">Net Profit (<span class="curr-label">DA</span>):</span>
            <span id="netProfitVal" class="highlight">0</span>
        </div>
        <div class="result-item">
            <span class="result-label">Return on Investment (ROI):</span>
            <span id="roiVal" class="highlight">0</span>
        </div>
        
        <div class="chart-container">
            <canvas id="profitChart"></canvas>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    Chart.defaults.color = '#94a3b8';
    Chart.defaults.font.family = "'Segoe UI', sans-serif";

    // Function to update input labels dynamically when currency changes
    function updateCurrencyLabels() {
        const selectedCurrency = document.getElementById('currency').value;
        const labels = document.getElementsByClassName('curr-label');
        for(let i = 0; i < labels.length; i++) {
            labels[i].innerText = selectedCurrency;
        }
        // If results are already visible, recalculate to update currency sign in results
        if(document.getElementById('resultsBox').style.display === "block") {
            calculateROI();
        }
    }

    function calculateROI() {
        const adSpend = parseFloat(document.getElementById('adSpend').value) || 0;
        const revenue = parseFloat(document.getElementById('revenue').value) || 0;
        const costs = parseFloat(document.getElementById('costs').value) || 0;
        const currentCurrency = document.getElementById('currency').value;
        
        if (adSpend === 0 && revenue === 0) {
            alert("Please enter valid numbers to calculate!");
            return;
        }
        
        const roas = adSpend > 0 ? (revenue / adSpend).toFixed(2) : 0;
        const netProfit = revenue - (adSpend + costs);
        const totalInvestment = adSpend + costs;
        const roi = totalInvestment > 0 ? ((netProfit / totalInvestment) * 100).toFixed(1) : 0;
        
        document.getElementById('roasVal').innerText = roas + " x";
        document.getElementById('netProfitVal').innerText = netProfit.toFixed(2) + " " + currentCurrency;
        document.getElementById('roiVal').innerText = roi + " %";
        
        const profitSpan = document.getElementById('netProfitVal');
        const roiSpan = document.getElementById('roiVal');
        
        if (netProfit < 0) {
            profitSpan.className = "highlight negative";
            roiSpan.className = "highlight negative";
        } else {
            profitSpan.className = "highlight";
            roiSpan.className = "highlight";
        }
        
        document.getElementById('resultsBox').style.display = "block";

        const ctx = document.getElementById('profitChart').getContext('2d');
        
        if (myChart) {
            myChart.destroy();
        }

        const displayProfit = netProfit > 0 ? netProfit : 0;

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Ad Spend', 'Product Costs', 'Net Profit'],
                datasets: [{
                    data: [adSpend, costs, displayProfit],
                    backgroundColor: ['#3b82f6', '#475569', '#10b981'],
                    borderColor: '#1e293b',
                    borderWidth: 2,
                    hoverOffset: 10
                }]
            },
            options: {
                responsive: true,
                cutout: '65%',
                plugins: {
                    legend: { 
                        position: 'bottom',
                        labels: {
                            padding: 20,
                            font: { size: 12, weight: '600' }
                        }
                    },
                    tooltip: {
                        backgroundColor: '#1e293b',
                        titleColor: '#f1f5f9',
                        bodyColor: '#f1f5f9',
                        borderColor: 'rgba(148, 163, 184, 0.2)',
                        borderWidth: 1,
                        padding: 12,
                        cornerRadius: 8
                    }
                }
            }
        });
    }
</script>

</body>
</html>
